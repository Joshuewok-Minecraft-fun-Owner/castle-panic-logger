<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Castle Panic Logger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 20px auto;
    }
    textarea {
      width: 100%;
      height: 150px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 12px;
      margin-bottom: 20px;
    }
    #viewer {
      margin-top: 20px;
      padding: 10px;
      background: #f4f4f4;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>Castle Panic Game Logger</h2>

<textarea id="scriptInput" placeholder="Paste your Castle Panic script..."></textarea>
<button id="saveBtn">Save Game</button>

<h3>Saved Games</h3>
<ul id="gameList"></ul>

<div id="viewer" style="display:none;">
  <h3 id="viewerTitle"></h3>
  <pre id="viewerContent"></pre>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
